<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
	
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/MindBreakOps/ANPR-Parking/main/anpr.png">
	<link rel="manifest" href="manifest.json">
	
	<title>MindBreak Parking OS</title>
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
	
	<style>
		/* Pro Corporate Palette */
		:root {
			--bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* Beige/White */
			--glass-bg: rgba(255, 255, 255, 0.45);
			--glass-border: rgba(255, 255, 255, 0.6);
			--text-color: #2b2d42;
			--input-bg: rgba(255, 255, 255, 0.8);
			--btn-bg: #2b2d42;
			--btn-text: #ffffff;
			--btn-hover: #1a1a24;
			/* Safe area padding for Notch / Dynamic Island */
			--safe-top: env(safe-area-inset-top, 20px);
			--safe-bottom: env(safe-area-inset-bottom, 20px);
		}

		body.dark-mode {
			--bg-gradient: linear-gradient(135deg, #2b2d42 0%, #1a1a24 100%); /* Graphite */
			--glass-bg: rgba(0, 0, 0, 0.3);
			--glass-border: rgba(255, 255, 255, 0.1);
			--text-color: #f8f9fa;
			--input-bg: rgba(0, 0, 0, 0.4);
			--btn-bg: #edf2f4;
			--btn-text: #2b2d42;
			--btn-hover: #d8e2e6;
		}

		body { 
			margin: 0; font-family: 'Inter', sans-serif; 
			background: var(--bg-gradient); color: var(--text-color); 
			min-height: 100vh; background-attachment: fixed; transition: 0.3s; 
			padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
		}
		
		.glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); padding: 20px; color: var(--text-color); }
		.hidden { display: none !important; }
		
		input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--glass-border); border-radius: 10px; background: var(--input-bg); color: var(--text-color); box-sizing: border-box; font-size: 1rem; outline: none; font-weight: 600;}
		button { background: var(--btn-bg); color: var(--btn-text); border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; font-size: 1rem; margin-top: 10px; }
		button:hover { background: var(--btn-hover); transform: translateY(-2px); }

		/* Layout */
		#login-view { height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
		.login-box { width: 100%; max-width: 350px; text-align: center; }
		
		nav { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(10px); position: sticky; top: var(--safe-top); z-index: 100; }
		nav div { cursor: pointer; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
		nav div.active { background: var(--btn-bg); color: var(--btn-text); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

		.panel { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
		
		/* Camera UI */
		.scanner-container { position: relative; width: 100%; height: 220px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
		#camera-feed { width: 100%; height: 100%; object-fit: cover; }
		.scanner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 4px solid rgba(255,255,255,0.3); box-sizing: border-box; display: flex; align-items: center; justify-content: center; pointer-events: none; }
		.crosshair { width: 150px; height: 60px; border: 2px solid #10b981; border-radius: 8px; box-shadow: 0 0 15px rgba(16,185,129,0.5); }
		
		/* Log Cards */
		.log-card { margin-bottom: 1rem; transition: 0.3s; display: flex; flex-direction: column; gap: 8px; }
		.status-in { border-left: 5px solid #10b981; }
		.status-out { border-left: 5px solid #ef4444; opacity: 0.85; }
		
		/* Invoice Modal */
		#invoice-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(8px); padding: 20px; box-sizing: border-box;}
		.modal-content { width: 100%; max-width: 350px; text-align: center; background: white; color: black; border-radius: 12px; overflow: hidden; }
		.invoice-canvas-area { padding: 30px; background: white; }
	</style>
</head>
<body>

	<div id="login-view">
		<div class="glass login-box">
			<img src="https://raw.githubusercontent.com/MindBreakOps/ANPR-Parking/main/anpr.png" style="width: 80px; margin-bottom: 10px;">
			<h2 style="margin-top:0;">System Login</h2>
			<input type="text" id="username" placeholder="Email / Username">
			<input type="password" id="password" placeholder="Password">
			<button onclick="login()">AUTHORIZE</button>
			<p id="login-msg" style="color: #ef4444; font-size: 0.9rem; font-weight: bold;"></p>
		</div>
	</div>

	<div id="app-view" class="hidden">
		<nav>
			<div class="nav-btn active" onclick="switchTab('dashboard')">Gate</div>
			<div class="nav-btn" onclick="switchTab('logs'); fetchLogs();">Logs</div>
			<div class="nav-btn" onclick="switchTab('account')">Profile</div>
			<div class="nav-btn" onclick="switchTab('settings')">Config</div>
		</nav>

		<div id="dashboard" class="panel">
			<div class="glass">
				<h2 style="margin-top:0;">Live Scanner</h2>
				
				<div class="scanner-container">
					<video id="camera-feed" autoplay playsinline></video>
					<div class="scanner-overlay"><div class="crosshair"></div></div>
				</div>
				
				<div style="display: flex; gap: 10px; margin-bottom: 15px;">
					<button onclick="startCamera()" style="background: #64748b; color: white;">Turn On Camera</button>
					<button onclick="scanPlate()" id="scan-btn" style="background: #10b981; color: white;">Snap & Scan</button>
				</div>

				<hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
				
				<h3 style="margin: 0 0 10px 0;">Manual / Scanned Entry</h3>
				<input type="text" id="plate-input" placeholder="ABC-1234" style="text-transform: uppercase; text-align: center; font-size: 1.5rem;">
				<button onclick="processEntry()">REGISTER VEHICLE</button>
				<p id="entry-msg" style="text-align: center; margin-top: 15px; font-weight: bold;"></p>
			</div>
		</div>

		<div id="logs" class="panel hidden">
			<input type="text" id="searchPlate" class="glass" placeholder="🔍 Search Plate Number..." onkeyup="filterLogs()" style="margin-bottom: 20px;">
			<div id="logs-container"></div>
		</div>

		<div id="account" class="panel hidden">
			<div class="glass" id="account-info"></div>
			<button onclick="logout()" style="margin-top: 20px; background: #ef4444; color: white;">Secure Logout</button>
		</div>

		<div id="settings" class="panel hidden">
			<div class="glass">
				<h2>System Configuration</h2>
				<label><strong>UI Theme:</strong></label>
				<select id="theme-selector" onchange="toggleTheme()">
					<option value="light">Corporate Beige (Light)</option>
					<option value="dark">Graphite Glass (Dark)</option>
				</select>
				<label><strong>Invoice Stamp:</strong></label>
				<input type="text" id="company-stamp" placeholder="Mind-Break Co." value="Mind-Break Co.">
			</div>
		</div>
	</div>

	<div id="invoice-modal" class="hidden">
		<div class="modal-content">
			<div id="invoice-canvas-area" class="invoice-canvas-area">
				<img src="https://raw.githubusercontent.com/MindBreakOps/ANPR-Parking/main/anpr.png" style="width: 70px;">
				<h3 id="inv-stamp-display" style="margin: 5px 0 15px 0; color: #555;">Mind-Break Co.</h3>
				<h2 style="border-bottom: 2px dashed #ccc; padding-bottom: 10px; margin-bottom: 15px;">PARKING TICKET</h2>
				<div style="text-align: left; font-size: 0.95rem; line-height: 1.8; color: #333;">
					<b>Plate:</b> <span id="inv-plate"></span><br>
					<b>Entry:</b> <span id="inv-entry"></span><br>
					<b>Exit:</b> <span id="inv-exit"></span><br>
					<b>Duration:</b> <span id="inv-duration"></span><br>
				</div>
				<h2 style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; color: #0f172a;">Total: <span id="inv-fee"></span></h2>
			</div>
			<div style="padding: 15px; background: #f8fafc; display: flex; gap: 10px;">
				<button onclick="exportImage()" style="background: #2b2d42; color: white;">💾 Save / Print</button>
				<button onclick="closeInvoice()" style="background: #94a3b8; color: white;">Close</button>
			</div>
		</div>
	</div>

	<script>
		// REPLACE THIS WITH YOUR APPS SCRIPT URL
		const API_URL = "https://script.google.com/macros/s/AKfycbxgxrc5Iw9fOMdgWoRZZTdfWetgfRCvkJbpwpH4mnCh0v7yvHoqh3Gs9wgUOxzlwzQejA/exec" 
		let currentUser = null;
		let videoStream = null;
		
		// --- CORE API ---
		async function apiCall(payload) {
			try {
				const res = await fetch(API_URL, {
					method: 'POST',
					headers: {
						'Content-Type': 'text/plain;charset=utf-8' // Crucial for Google Apps Script
					},
					body: JSON.stringify(payload)
				});
				return await res.json();
			} catch (error) {
				console.error("API Call Failed:", error);
				document.getElementById('login-msg').innerText = "Network Error. Check console.";
				return { success: false, message: "Connection blocked." };
			}
		}

		// --- CAMERA & OCR LOGIC ---
		async function startCamera() {
			const video = document.getElementById('camera-feed');
			try {
				videoStream = await navigator.mediaDevices.getUserMedia({ 
					video: { facingMode: "environment" } // Forces back camera on mobile
				});
				video.srcObject = videoStream;
			} catch (err) {
				alert("Camera access denied or unsupported on this device.");
			}
		}

		async function scanPlate() {
			const video = document.getElementById('camera-feed');
			const btn = document.getElementById('scan-btn');
			if(!video.srcObject) return alert("Please Turn On Camera First");

			btn.innerText = "Scanning...";
			btn.disabled = true;

			// Create a hidden canvas to grab the current video frame
			const canvas = document.createElement('canvas');
			canvas.width = video.videoWidth;
			canvas.height = video.videoHeight;
			canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
			
			try {
				// Run Tesseract.js OCR on the captured frame
				const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
					logger: m => console.log(m)
				});
				
				// Clean up the text (remove spaces, newlines, special chars)
				const cleanedText = text.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
				
				if(cleanedText.length > 2) {
					document.getElementById('plate-input').value = cleanedText;
					document.getElementById('entry-msg').innerText = "✅ Plate Detected";
					document.getElementById('entry-msg').style.color = "#10b981";
				} else {
					alert("Could not read plate clearly. Please try again or enter manually.");
				}
			} catch (e) {
				alert("OCR Error. Please enter manually.");
			} finally {
				btn.innerText = "Snap & Scan";
				btn.disabled = false;
			}
		}

		// --- CORE API ---
		async function apiCall(payload) {
			const res = await fetch(API_URL, {
				method: 'POST',
				body: JSON.stringify(payload)
			});
			return await res.json();
		}

		// --- AUTH & NAVIGATION ---
		async function login() {
			const u = document.getElementById('username').value;
			const p = document.getElementById('password').value;
			document.getElementById('login-msg').innerText = "Authenticating...";
			
			const res = await apiCall({ action: "login", username: u, password: p });
			if (res.success) {
				currentUser = res.user;
				document.getElementById('login-view').classList.add('hidden');
				document.getElementById('app-view').classList.remove('hidden');
				
				document.getElementById('account-info').innerHTML = `
					<h2>Profile</h2>
					<p><strong>Name:</strong> ${currentUser.name}</p>
					<p><strong>Role:</strong> ${currentUser.role}</p>
					<p><strong>Title:</strong> ${currentUser.title}</p>
				`;
			} else {
				document.getElementById('login-msg').innerText = res.message;
			}
		}

		function logout() { 
			if(videoStream) videoStream.getTracks().forEach(track => track.stop());
			location.reload(); 
		}

		function switchTab(tabId) {
			document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
			document.getElementById(tabId).classList.remove('hidden');
			document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
			event.target.classList.add('active');
		}

		// --- GATE & LOGS LOGIC ---
		async function processEntry() {
			const plate = document.getElementById('plate-input').value.toUpperCase();
			const msgBox = document.getElementById('entry-msg');
			if(!plate) return;
			
			msgBox.innerText = "Processing to Database...";
			msgBox.style.color = "inherit";

			const res = await apiCall({ action: "processEntry", plate: plate });
			if(res.success) {
				msgBox.innerText = `✅ Entry Saved: ${plate} at ${res.time}`;
				msgBox.style.color = "#10b981";
				document.getElementById('plate-input').value = "";
			} else {
				msgBox.innerText = `❌ Error: ${res.message}`;
				msgBox.style.color = "#ef4444";
			}
		}

		async function fetchLogs() {
			document.getElementById('logs-container').innerHTML = "<p>Loading records...</p>";
			const res = await apiCall({ action: "getLogs" });
			if(res.success) renderLogs(res.data);
		}

		function renderLogs(logs) {
			const container = document.getElementById('logs-container');
			container.innerHTML = "";
			logs.forEach(log => {
				const isIN = log.status === "IN";
				const card = document.createElement('div');
				card.className = `glass log-card ${isIN ? 'status-in' : 'status-out'}`;
				card.setAttribute('data-plate', log.plate.toUpperCase()); 
				
				card.innerHTML = `
					<div style="display: flex; justify-content: space-between; font-weight: 800; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px;">
						<span>🚘 ${log.plate}</span>
						<span style="color: ${isIN ? '#10b981' : '#ef4444'};">${log.status}</span>
					</div>
					<div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-top: 5px;">
						<div><b>Entry:</b> ${log.entry}<br><b>Exit:</b> ${isIN ? '--' : log.exit}</div>
						<div style="text-align: right;"><b>Duration:</b> ${isIN ? 'Active' : log.duration}<br><b>Fee:</b> ${isIN ? '--' : log.fee}</div>
					</div>
					<div style="margin-top: 10px; display: flex; gap: 8px;">
						${isIN ? `<button onclick="checkout('${log.plate}')" style="background: #10b981; color: white;">Check Out & Bill</button>` : ''}
						<button onclick='showInvoice(${JSON.stringify(log)})' style="background: #64748b; color: white;">${isIN ? 'View Details' : 'Export Ticket'}</button>
					</div>
				`;
				container.appendChild(card);
			});
		}

		function filterLogs() {
			const input = document.getElementById('searchPlate').value.toUpperCase();
			const cards = document.querySelectorAll('.log-card');
			cards.forEach(card => {
				card.style.display = card.getAttribute('data-plate').includes(input) ? "flex" : "none";
			});
		}

		async function checkout(plate) {
			if(!confirm(`Check out ${plate}?`)) return;
			const res = await apiCall({ action: "checkout", plate: plate });
			if(res.success) {
				showInvoice(res);
				fetchLogs(); 
			} else {
				alert(res.message);
			}
		}

		// --- INVOICE & EXPORT ---
		function showInvoice(data) {
			document.getElementById('inv-stamp-display').innerText = document.getElementById('company-stamp').value;
			document.getElementById('inv-plate').innerText = data.plate;
			document.getElementById('inv-entry').innerText = data.entry || "Unknown";
			document.getElementById('inv-exit').innerText = data.exit || "Not Checked Out";
			document.getElementById('inv-duration').innerText = data.duration || "Active";
			document.getElementById('inv-fee').innerText = data.fee || "Pending Calculation";
			
			document.getElementById('invoice-modal').classList.remove('hidden');
		}

		function closeInvoice() { document.getElementById('invoice-modal').classList.add('hidden'); }

		async function exportImage() {
			const element = document.getElementById('invoice-canvas-area');
			const canvas = await html2canvas(element, { scale: 3, useCORS: true }); 
			const link = document.createElement('a');
			link.download = `Ticket_${document.getElementById('inv-plate').innerText}.png`;
			link.href = canvas.toDataURL('image/png');
			link.click();
		}

		function toggleTheme() {
			if (document.getElementById('theme-selector').value === 'dark') document.body.classList.add('dark-mode');
			else document.body.classList.remove('dark-mode');
		}
	</script>
</body>
</html>
